<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KA-BAYAN SYNC</title>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800&family=Work+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #1a0f14; display: flex; align-items: center; justify-content: center; font-family: 'Public Sans', sans-serif; }
  #root { display: flex; align-items: center; justify-content: center; min-height: 100vh; width: 100%; }
  .phone-shell {
    width: 390px; height: 844px; border-radius: 50px; overflow: hidden;
    position: relative; background: #faf5ff;
    box-shadow: 0 0 0 10px #111, 0 30px 80px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(255,255,255,0.08);
    flex-shrink: 0;
  }
  .screen { position: absolute; inset: 0; width: 100%; height: 100%; overflow: hidden; }
  .slide-in { animation: slideIn 0.32s cubic-bezier(0.4,0,0.2,1) forwards; }
  .slide-out { animation: slideOut 0.32s cubic-bezier(0.4,0,0.2,1) forwards; }
  .slide-up { animation: slideUp 0.32s cubic-bezier(0.4,0,0.2,1) forwards; }
  @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
  @keyframes slideOut { from { transform: translateX(0); } to { transform: translateX(-40px); opacity: 0; } }
  @keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes scanLine { 0%,100% { top: 10%; } 50% { top: 85%; } }
  @keyframes ping { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(2.2); opacity: 0; } }
  @keyframes countdown { from { stroke-dashoffset: 0; } to { stroke-dashoffset: 565; } }
  @keyframes fadeIn { from { opacity:0; transform:scale(0.9); } to { opacity:1; transform:scale(1); } }
  @keyframes shimmer { 0% { background-position: -400px 0; } 100% { background-position: 400px 0; } }
  .status-bar { height: 48px; display: flex; align-items: flex-end; justify-content: space-between; padding: 0 28px 6px; font-size: 12px; font-weight: 600; color: inherit; flex-shrink: 0; }
  .btn-plum { background: #911b44; color: #fff; border: none; border-radius: 12px; height: 51px; width: 100%; font-family: 'Public Sans', sans-serif; font-weight: 700; font-size: 16px; cursor: pointer; transition: all 0.15s; }
  .btn-plum:active { filter: brightness(0.9); transform: scale(0.98); }
  .btn-orange { background: #ec5914; color: #fff; border: none; border-radius: 12px; height: 51px; width: 100%; font-family: 'Public Sans', sans-serif; font-weight: 700; font-size: 16px; cursor: pointer; transition: all 0.15s; }
  .btn-orange:active { filter: brightness(0.9); transform: scale(0.98); }
  .btn-ghost { background: transparent; color: #911b44; border: 2px solid rgba(145,27,68,0.2); border-radius: 12px; height: 51px; width: 100%; font-family: 'Public Sans', sans-serif; font-weight: 700; font-size: 16px; cursor: pointer; }
  .input-field { background: #fff; border: 1.5px solid rgba(145,27,68,0.25); border-radius: 12px; height: 52px; width: 100%; padding: 0 16px; font-family: 'Public Sans', sans-serif; font-size: 14px; color: #2d1923; outline: none; transition: border-color 0.2s; }
  .input-field:focus { border-color: #911b44; }
  .input-field::placeholder { color: rgba(190,200,209,0.9); }
  .bottom-nav { position: absolute; bottom: 0; left: 0; right: 0; height: 80px; background: rgba(250,245,255,0.95); backdrop-filter: blur(24px); box-shadow: 0 -4px 24px rgba(19,26,52,0.06); border-radius: 0 0 50px 50px; display: flex; align-items: center; justify-content: space-around; padding: 0 8px 12px; }
  .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; padding: 8px 16px; border-radius: 16px; transition: all 0.15s; flex: 1; }
  .nav-item.active { background: rgba(145,27,68,0.08); }
  .nav-label { font-size: 10px; font-weight: 700; letter-spacing: 0.5px; color: rgb(190,200,209); }
  .nav-label.active { color: #911b44; }
  .card { background: #fff; border-radius: 20px; padding: 20px; box-shadow: 0 2px 16px rgba(0,0,0,0.06); }
  .tag-verified { background: rgba(113,250,200,0.3); border: 1px solid rgba(0,108,79,0.1); color: rgb(0,81,59); padding: 4px 12px; border-radius: 9999px; font-size: 11px; font-weight: 700; letter-spacing: 1px; }
  .progress-bar-track { height: 7px; border-radius: 20px; background: rgba(255,90,0,0.25); }
  .progress-bar-fill { height: 7px; border-radius: 20px; background: #f25c05; }
  .map-bg { background: #c8d8c0; position: relative; overflow: hidden; }
  .map-grid { position: absolute; inset: 0; opacity: 0.3; background-image: linear-gradient(rgba(100,130,100,0.4) 1px, transparent 1px), linear-gradient(90deg, rgba(100,130,100,0.4) 1px, transparent 1px); background-size: 30px 30px; }
  .map-road-h { position: absolute; background: rgba(255,255,255,0.7); height: 8px; left: 0; right: 0; border-radius: 2px; }
  .map-road-v { position: absolute; background: rgba(255,255,255,0.7); width: 8px; top: 0; bottom: 0; border-radius: 2px; }
  .face-oval { border-radius: 50%; border: 3px solid; overflow: hidden; position: relative; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── COLORS ──
const C = {
  plum: '#911b44',
  plumDark: '#3c1226',
  plumDeep: '#7c012d',
  orange: '#ec5914',
  orangeLight: '#ffe7db',
  bg: '#faf5ff',
  bgWhite: '#fff',
  textDark: '#2d1923',
  green: '#006c4f',
  greenLight: '#afe4dc',
  greenPale: '#d4feef',
};

// ── ICONS (SVG inline) ──
const Icon = ({ name, size = 20, color = C.plum, style = {} }) => {
  const icons = {
    back: <path d="M3.825 9L9.425 14.6L8 16L0 8L8 0L9.425 1.4L3.825 7L16 7L16 9Z" fill={color}/>,
    menu: <path d="M0 12L0 10L18 10L18 12ZM0 7L0 5L18 5L18 7ZM0 2L0 0L18 0L18 2Z" fill={color}/>,
    bell: <><path d="M10 18c0 1.1-.9 2-2 2s-2-.9-2-2H10zm8-3H2v-1l2-2V8c0-3.1 2-5.6 5-6.3V1a1 1 0 012 0v.7C14 2.4 16 4.9 16 8v4l2 2v1z" fill={color}/></>,
    check: <path d="M2 10l5 5L18 4" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" fill="none"/>,
    star: <path d="M2.231 11.083L3.179 6.985L0 4.229L4.2 3.865L5.833 0L7.467 3.865L11.667 4.229L8.488 6.985L9.435 11.083L5.833 8.91Z" fill={color}/>,
    location: <><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" fill={color}/></>,
    camera: <><path d="M12 15.2A3.2 3.2 0 1015.2 12 3.2 3.2 0 0012 15.2zM20 6h-2.83L16 4H8L6.83 6H4a2 2 0 00-2 2v12a2 2 0 002 2h16a2 2 0 002-2V8a2 2 0 00-2-2z" fill={color}/></>,
    filter: <path d="M7 12L7 10L11 10L11 12ZM3 7L3 5L15 5L15 7ZM0 2L0 0L18 0L18 2Z" fill={color}/>,
    face: <><circle cx="12" cy="12" r="10" stroke={color} strokeWidth="1.5" fill="none"/><circle cx="9" cy="11" r="1" fill={color}/><circle cx="15" cy="11" r="1" fill={color}/><path d="M9 16s1 1.5 3 1.5 3-1.5 3-1.5" stroke={color} strokeWidth="1.5" strokeLinecap="round" fill="none"/></>,
    id: <><rect x="2" y="5" width="20" height="14" rx="2" stroke={color} strokeWidth="1.5" fill="none"/><path d="M6 9h12M6 13h7" stroke={color} strokeWidth="1.5" strokeLinecap="round"/></>,
    wallet: <><path d="M21 7H3a1 1 0 00-1 1v12a1 1 0 001 1h18a1 1 0 001-1V8a1 1 0 00-1-1z" stroke={color} strokeWidth="1.5" fill="none"/><path d="M16 14a1 1 0 110-2 1 1 0 010 2z" fill={color}/><path d="M3 7V5a2 2 0 012-2h14a2 2 0 012 2v2" stroke={color} strokeWidth="1.5"/></>,
    profile: <><circle cx="12" cy="8" r="4" stroke={color} strokeWidth="1.5" fill="none"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke={color} strokeWidth="1.5" strokeLinecap="round" fill="none"/></>,
    home: <><path d="M3 12L12 3l9 9" stroke={color} strokeWidth="1.5" strokeLinecap="round" fill="none"/><path d="M9 21V12h6v9" stroke={color} strokeWidth="1.5" fill="none"/></>,
    tasks: <><rect x="3" y="3" width="7" height="7" rx="1" stroke={color} strokeWidth="1.5" fill="none"/><rect x="14" y="3" width="7" height="7" rx="1" stroke={color} strokeWidth="1.5" fill="none"/><rect x="3" y="14" width="7" height="7" rx="1" stroke={color} strokeWidth="1.5" fill="none"/><rect x="14" y="14" width="7" height="7" rx="1" stroke={color} strokeWidth="1.5" fill="none"/></>,
    edit: <><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7" stroke={color} strokeWidth="1.5" fill="none" strokeLinecap="round"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z" stroke={color} strokeWidth="1.5" fill="none" strokeLinejoin="round"/></>,
    shield: <><path d="M12 2L3 7v5c0 5.25 3.9 10.17 9 11.34C17.1 22.17 21 17.25 21 12V7L12 2z" stroke={color} strokeWidth="1.5" fill="none"/><path d="M9 12l2 2 4-4" stroke={color} strokeWidth="1.5" strokeLinecap="round" fill="none"/></>,
  };
  const viewBoxes = { menu: '0 0 18 12', filter: '0 0 18 12', back: '0 0 16 16', check: '0 0 20 20', star: '0 0 11.667 11.083' };
  const vb = viewBoxes[name] || `0 0 24 24`;
  return (
    <svg width={size} height={size} viewBox={vb} fill="none" style={style}>
      {icons[name]}
    </svg>
  );
};

// ── STATUS BAR ──
const StatusBar = ({ light = false }) => (
  <div className="status-bar" style={{ color: light ? '#fff' : C.plumDark }}>
    <span>9:41</span>
    <div style={{ position: 'absolute', left: '50%', transform: 'translateX(-50%)', top: 14, width: 120, height: 34, background: light ? 'rgba(0,0,0,0.5)' : '#1a0f14', borderRadius: 20 }} />
    <div style={{ display: 'flex', gap: 4, alignItems: 'center' }}>
      <svg width="16" height="12" viewBox="0 0 16 12" fill={light ? '#fff' : C.plumDark}><rect x="0" y="4" width="3" height="8" rx="1"/><rect x="4.5" y="2" width="3" height="10" rx="1"/><rect x="9" y="0" width="3" height="12" rx="1"/><rect x="13.5" y="0" width="2" height="12" rx="1" opacity="0.3"/></svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><rect x="0.5" y="0.5" width="13" height="11" rx="2" stroke={light ? '#fff' : C.plumDark}/><rect x="2" y="2" width="9" height="8" rx="1" fill={light ? '#fff' : C.plumDark}/><rect x="14" y="4" width="2" height="4" rx="1" fill={light ? '#fff' : C.plumDark}/></svg>
    </div>
  </div>
);

// ── BACK HEADER ──
const BackHeader = ({ title, onBack, light = false, rightEl = null }) => (
  <div style={{ height: 60, background: light ? C.plum : C.bg, display: 'flex', alignItems: 'center', padding: '0 24px', gap: 16 }}>
    <button onClick={onBack} style={{ background: 'none', border: 'none', cursor: 'pointer', width: 32, height: 32, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
      <Icon name="back" size={16} color={light ? '#fff' : C.plum} />
    </button>
    <span style={{ fontFamily: 'Public Sans', fontWeight: 700, fontSize: 18, color: light ? '#fff' : C.plumDark, flex: 1 }}>{title}</span>
    {rightEl}
  </div>
);

// ── MAIN APP HEADER ──
const AppHeader = ({ onNotif }) => (
  <div style={{ height: 72, background: 'rgb(250,248,255)', display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 24px' }}>
    <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
      <Icon name="menu" size={18} color={C.plum} />
      <span style={{ fontFamily: 'Public Sans', fontWeight: 700, fontSize: 20, letterSpacing: '-1px', color: C.plum }}>KA-BAYAN SYNC</span>
    </div>
    <button onClick={onNotif} style={{ width: 40, height: 40, borderRadius: '50%', background: 'rgba(236,89,20,0.2)', border: 'none', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
      <Icon name="bell" size={20} color={C.plum} />
    </button>
  </div>
);

// ── BOTTOM NAV ──
const BottomNav = ({ active, onNav }) => {
  const tabs = [
    { id: 'home', label: 'Home', icon: 'home' },
    { id: 'tasks', label: 'Tasks', icon: 'tasks' },
    { id: 'wallet', label: 'Wallet', icon: 'wallet' },
    { id: 'profile', label: 'Profile', icon: 'profile' },
  ];
  return (
    <div className="bottom-nav">
      {tabs.map(t => (
        <button key={t.id} onClick={() => onNav(t.id)} className={`nav-item ${active===t.id?'active':''}`} style={{ background: active===t.id ? 'rgba(145,27,68,0.08)' : 'transparent', border: 'none', cursor: 'pointer' }}>
          <Icon name={t.icon} size={22} color={active===t.id ? C.plum : 'rgb(190,200,209)'} />
          <span className={`nav-label ${active===t.id?'active':''}`}>{t.label}</span>
        </button>
      ))}
    </div>
  );
};

// ═══════════════════════════════════════════════════
// SCREENS
// ═══════════════════════════════════════════════════

// ── WELCOME ──
const WelcomeScreen = ({ nav }) => (
  <div className="screen" style={{ background: C.plum, display: 'flex', flexDirection: 'column' }}>
    <StatusBar light />
    {/* Hero image placeholder */}
    <div style={{ flex: 1, position: 'relative', overflow: 'hidden' }}>
      <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(135deg, #5c0c24 0%, #3c1226 40%, #911b44 100%)' }} />
      {/* decorative circles */}
      <div style={{ position: 'absolute', top: -60, right: -60, width: 280, height: 280, borderRadius: '50%', background: 'rgba(255,255,255,0.04)' }} />
      <div style={{ position: 'absolute', top: 60, right: 30, width: 180, height: 180, borderRadius: '50%', background: 'rgba(236,89,20,0.12)' }} />
      <div style={{ position: 'absolute', top: 20, left: -40, width: 200, height: 200, borderRadius: '50%', background: 'rgba(255,255,255,0.03)' }} />
      {/* Illustration placeholder */}
      <div style={{ position: 'absolute', top: '8%', left: '50%', transform: 'translateX(-50%)', width: 260, height: 260, borderRadius: 32, background: 'rgba(217,217,217,0.12)', display: 'flex', alignItems: 'center', justifyContent: 'center', border: '1px dashed rgba(255,255,255,0.15)' }}>
        <div style={{ textAlign: 'center', color: 'rgba(255,255,255,0.35)', fontFamily: 'monospace', fontSize: 11 }}>
          <div style={{ fontSize: 48, marginBottom: 8 }}>🏘️</div>
          <div>community illustration</div>
        </div>
      </div>
      <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, padding: '0 38px 40px' }}>
        <h1 style={{ fontFamily: 'Inter', fontWeight: 700, fontSize: 38, lineHeight: '42px', letterSpacing: '0.5px', color: C.plumDark, marginBottom: 14 }}>
          Welcome to the<br/>Neighborhood.
        </h1>
        <p style={{ fontFamily: 'Inter', fontWeight: 500, fontSize: 16, lineHeight: '22px', color: 'rgba(255,255,255,0.85)', textAlign: 'justify', marginBottom: 32 }}>
          Ka-Bayan Sync connects you with locals. Offer your skills and build stronger community together.
        </p>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
          <button className="btn-plum" onClick={() => nav('signup')} style={{ background: '#fff', color: C.plum, fontSize: 15, letterSpacing: 0.2 }}>
            Join Ka-Bayan Sync
          </button>
          <button className="btn-ghost" onClick={() => nav('signin')} style={{ borderColor: 'rgba(255,255,255,0.3)', color: '#fff', fontSize: 15 }}>
            I already have an account
          </button>
        </div>
      </div>
    </div>
  </div>
);

// ── SIGN UP ──
const SignUpScreen = ({ nav }) => {
  const [form, setForm] = useState({ name: '', email: '', password: '' });
  return (
    <div className="screen" style={{ background: C.plum, display: 'flex', flexDirection: 'column' }}>
      <StatusBar light />
      <div style={{ flex: 1, background: C.bg, borderRadius: '28px 28px 0 0', marginTop: 4, display: 'flex', flexDirection: 'column', padding: '32px 32px 40px' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 14, marginBottom: 32 }}>
          <button onClick={() => nav('welcome')} style={{ width: 40, height: 40, borderRadius: '50%', background: 'rgba(145,27,68,0.08)', border: 'none', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <Icon name="back" size={16} color={C.plumDark} />
          </button>
          <span style={{ fontFamily: 'Public Sans', fontWeight: 700, fontSize: 22, color: C.plumDark }}>Create your account</span>
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 14, marginBottom: 28 }}>
          <div>
            <label style={{ fontSize: 11, fontWeight: 700, color: C.plum, letterSpacing: 1, display: 'block', marginBottom: 6 }}>FULL NAME</label>
            <input className="input-field" placeholder="Juan D. Dela Cruz" value={form.name} onChange={e => setForm({...form, name: e.target.value})} />
          </div>
          <div>
            <label style={{ fontSize: 11, fontWeight: 700, color: C.plum, letterSpacing: 1, display: 'block', marginBottom: 6 }}>EMAIL ADDRESS</label>
            <input className="input-field" type="email" placeholder="juan@email.com" value={form.email} onChange={e => setForm({...form, email: e.target.value})} />
          </div>
          <div>
            <label style={{ fontSize: 11, fontWeight: 700, color: C.plum, letterSpacing: 1, display: 'block', marginBottom: 6 }}>PASSWORD</label>
            <input className="input-field" type="password" placeholder="••••••••" value={form.password} onChange={e => setForm({...form, password: e.target.value})} />
          </div>
        </div>
        {/* Step indicators */}
        <div style={{ display: 'flex', gap: 4, marginBottom: 28 }}>
          {[C.orange, 'rgba(255,90,0,0.25)', 'rgba(255,90,0,0.25)'].map((c,i) => (
            <div key={i} style={{ flex: 1, height: 7, borderRadius: 20, background: c }} />
          ))}
        </div>
        <button className="btn-orange" onClick={() => nav('id-select')}>Create Account</button>
        <p style={{ textAlign: 'center', marginTop: 18, fontSize: 12, color: C.plum, fontFamily: 'Work Sans', fontWeight: 300 }}>
          Already have an account? <span style={{ color: '#ff7f1c', fontWeight: 700, cursor: 'pointer' }} onClick={() => nav('signin')}>Sign in</span>
        </p>
      </div>
    </div>
  );
};

// ── SIGN IN ──
const SignInScreen = ({ nav }) => (
  <div className="screen" style={{ background: C.plum, display: 'flex', flexDirection: 'column' }}>
    <StatusBar light />
    <div style={{ flex: 1, background: C.bg, borderRadius: '28px 28px 0 0', marginTop: 4, display: 'flex', flexDirection: 'column', padding: '32px 32px 40px' }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 14, marginBottom: 36 }}>
        <button onClick={() => nav('welcome')} style={{ width: 40, height: 40, borderRadius: '50%', background: 'rgba(145,27,68,0.08)', border: 'none', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <Icon name="back" size={16} color={C.plumDark} />
        </button>
        <span style={{ fontFamily: 'Public Sans', fontWeight: 700, fontSize: 21, color: C.plumDark }}>Welcome back, Ka-Bayan!</span>
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 14, marginBottom: 16 }}>
        <div>
          <label style={{ fontSize: 11, fontWeight: 700, color: C.plum, letterSpacing: 1, display: 'block', marginBottom: 6 }}>EMAIL ADDRESS</label>
          <input className="input-field" type="email" placeholder="juan@email.com" />
        </div>
        <div>
          <label style={{ fontSize: 11, fontWeight: 700, color: C.plum, letterSpacing: 1, display: 'block', marginBottom: 6 }}>PASSWORD</label>
          <input className="input-field" type="password" placeholder="••••••••" />
        </div>
      </div>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 28 }}>
        <label style={{ display: 'flex', alignItems: 'center', gap: 8, cursor: 'pointer' }}>
          <div style={{ width: 18, height: 18, borderRadius: 4, border: `2px solid ${C.plum}`, background: 'transparent' }} />
          <span style={{ fontSize: 12, fontWeight: 500, color: C.plum }}>Remember me</span>
        </label>
        <span style={{ fontSize: 12, fontWeight: 700, color: C.orange, cursor: 'pointer' }}>Forgot password?</span>

// ── FACE SCAN ──
const FaceScanScreen = ({ nav }) => {
  const [phase, setPhase] = useState('ready'); // ready, scanning, done
  const [progress, setProgress] = useState(0);
  useEffect(() => {
    if (phase !== 'scanning') return;
    const iv = setInterval(() => {
      setProgress(p => {
        if (p >= 100) { clearInterval(iv); setPhase('done'); return 100; }
        return p + 2;
      });
    }, 60);
    return () => clearInterval(iv);
  }, [phase]);
  useEffect(() => {
    if (phase === 'done') { const t = setTimeout(() => nav('verify-success'), 1200); return () => clearTimeout(t); }
  }, [phase]);

  return (
    <div className="screen" style={{ background: C.bg, display: 'flex', flexDirection: 'column' }}>
      <StatusBar />
      <div style={{ display: 'flex', alignItems: 'center', gap: 14, padding: '8px 20px 8px' }}>

  'verify-success': VerifySuccessScreen,
  'hirer-home': HirerHomeScreen,
  'create-task': CreateTaskScreen,
  'worker-home': WorkerHomeScreen,
  'task-available': TaskAvailableScreen,
  'evidence-log': EvidenceLogScreen,
  'completion-summary': CompletionSummaryScreen,
};

function App() {
  const [screen, setScreen] = useState('welcome');
  const nav = useCallback((s) => setScreen(s), []);
  const Screen = SCREENS[screen] || WelcomeScreen;
  return (
    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', minHeight:'100vh', padding:'24px 16px', gap:20 }}>
      {/* Nav hint chips */}
      <div style={{ display:'flex', gap:8, flexWrap:'wrap', justifyContent:'center', maxWidth:520 }}>
        {[['welcome','🏠 Welcome'],['signin','🔑 Sign In'],['signup','📝 Sign Up'],['id-select','🪪 ID Select'],['id-scan','📷 ID Scan'],['id-review','✅ ID Review'],['face-scan','👤 Face Scan'],['verify-success','🎉 Verified'],['hirer-home','🗺️ Hirer Home'],['create-task','📋 Create Task'],['worker-home','👷 Worker Home'],['task-available','📢 Task Alert'],['evidence-log','📸 Evidence'],['completion-summary','🏁 Complete']].map(([id,label]) => (
          <button key={id} onClick={() => nav(id)} style={{ padding:'5px 10px', borderRadius:20, background: screen===id ? C.plum : 'rgba(255,255,255,0.1)', border: screen===id ? 'none' : '1px solid rgba(255,255,255,0.15)', color: screen===id ? '#fff' : 'rgba(255,255,255,0.6)', fontFamily:'Public Sans', fontWeight:600, fontSize:11, cursor:'pointer', transition:'all 0.15s', whiteSpace:'nowrap' }}>{label}</button>
        ))}
      </div>
      <div className="phone-shell">
        <Screen nav={nav} />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
