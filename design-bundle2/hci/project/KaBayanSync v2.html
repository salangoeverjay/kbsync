<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>KA-BAYAN SYNC v2</title>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0e0810;display:flex;align-items:center;justify-content:center;font-family:'Public Sans',sans-serif}
#root{display:flex;flex-direction:column;align-items:center;min-height:100vh;width:100%;padding:20px 16px 32px;gap:16px}

/* ── PHONE ── */
.phone{width:390px;height:844px;border-radius:52px;overflow:hidden;position:relative;background:#faf5ff;
  box-shadow:0 0 0 11px #1c1218,0 0 0 13px #2d1923,0 40px 100px rgba(0,0,0,0.7);flex-shrink:0}
.screen{position:absolute;inset:0;overflow:hidden;display:flex;flex-direction:column}

/* ── ANIM ── */
@keyframes slideInRight{from{transform:translateX(100%)}to{transform:translateX(0)}}
@keyframes slideInLeft{from{transform:translateX(-30px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fadeUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:scale(0.94)}to{opacity:1;transform:scale(1)}}
@keyframes ping{0%{transform:scale(1);opacity:.7}100%{transform:scale(2.4);opacity:0}}
@keyframes scan{0%,100%{top:5%}50%{top:88%}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes shimmer{0%{background-position:-300px 0}100%{background-position:300px 0}}
@keyframes countRing{from{stroke-dashoffset:0}to{stroke-dashoffset:565}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(236,89,20,0.3)}50%{box-shadow:0 0 40px rgba(236,89,20,0.6)}}

.ani-slide{animation:slideInRight .3s cubic-bezier(.4,0,.2,1)}
.ani-up{animation:fadeUp .35s cubic-bezier(.4,0,.2,1)}

/* ── SCROLLBAR ── */
.scrollable{overflow-y:auto;-webkit-overflow-scrolling:touch}
.scrollable::-webkit-scrollbar{display:none}

/* ── STATUS BAR ── */
.sbar{height:48px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 28px 8px;flex-shrink:0;font-size:12px;font-weight:700;letter-spacing:.3px}
.sbar .notch{position:absolute;left:50%;transform:translateX(-50%);top:12px;width:126px;height:36px;border-radius:18px;background:inherit}

/* ── BUTTONS ── */
.btn{border:none;border-radius:14px;height:52px;width:100%;font-family:'Public Sans',sans-serif;font-weight:700;font-size:15px;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center;gap:8px;letter-spacing:.1px}
.btn:active{transform:scale(.97);filter:brightness(.9)}
.btn-plum{background:#911b44;color:#fff}
.btn-orange{background:#ec5914;color:#fff}
.btn-gradient{background:linear-gradient(135deg,#911b44,#ec5914);color:#fff;box-shadow:0 4px 20px rgba(145,27,68,.35)}
.btn-ghost{background:transparent;color:#911b44;border:1.5px solid rgba(145,27,68,.25)}
.btn-white{background:#fff;color:#911b44;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.btn-sm{height:38px;border-radius:10px;font-size:13px;width:auto;padding:0 18px}
.btn-pill{height:34px;border-radius:999px;font-size:12px;width:auto;padding:0 16px}

/* ── INPUTS ── */
.inp{width:100%;height:54px;border-radius:14px;border:1.5px solid rgba(145,27,68,.15);background:#fff;padding:0 16px;font-family:'Public Sans',sans-serif;font-size:14px;color:#2d1923;outline:none;transition:border-color .2s}
.inp:focus{border-color:#911b44}
.inp::placeholder{color:rgba(145,27,68,.3);font-weight:500}
.inp-label{font-size:11px;font-weight:700;letter-spacing:1.4px;color:#911b44;margin-bottom:7px;display:block;text-transform:uppercase}

/* ── CARDS ── */
.card{background:#fff;border-radius:22px;box-shadow:0 2px 20px rgba(0,0,0,.06)}
.card-glass{background:rgba(255,255,255,.85);backdrop-filter:blur(20px);border-radius:22px;border:1px solid rgba(255,255,255,.6);box-shadow:0 4px 24px rgba(0,0,0,.08)}

/* ── NAV ── */
.bnav{position:absolute;bottom:0;left:0;right:0;height:84px;background:rgba(250,245,255,.96);backdrop-filter:blur(24px);border-top:1px solid rgba(145,27,68,.06);border-radius:0 0 52px 52px;display:flex;align-items:center;justify-content:space-around;padding:0 8px 16px;flex-shrink:0}
.nitem{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:8px 14px;border-radius:14px;transition:all .18s;border:none;background:none}
.nitem.on{background:rgba(145,27,68,.09)}
.nitem svg{transition:all .18s}
.nlabel{font-size:10px;font-weight:700;letter-spacing:.5px;color:#bec8d1;transition:color .18s}
.nlabel.on{color:#911b44}

/* ── CHIPS ── */
.chip{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:999px;font-family:'Public Sans',sans-serif;font-weight:700;font-size:10px;letter-spacing:.8px}
.chip-green{background:rgba(175,228,220,.4);color:#006c4f}
.chip-orange{background:rgba(236,89,20,.1);color:#ec5914}
.chip-plum{background:rgba(145,27,68,.1);color:#911b44}

/* ── NAV SCREEN PICKER ── */
.picker{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;max-width:500px}
.pick-btn{padding:5px 11px;border-radius:20px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.07);color:rgba(255,255,255,.55);font-family:'Public Sans',sans-serif;font-weight:600;font-size:10px;cursor:pointer;transition:all .15s;letter-spacing:.3px;white-space:nowrap}
.pick-btn.active{background:#911b44;border-color:#911b44;color:#fff}

/* ── METRIC CARD ── */
.metric{background:#fff;border-radius:18px;padding:16px;box-shadow:0 2px 16px rgba(0,0,0,.06);display:flex;flex-direction:column;gap:6px}
.metric-val{font-family:'Public Sans',sans-serif;font-weight:800;font-size:24px;color:#911b44}
.metric-label{font-size:11px;font-weight:600;color:rgba(45,25,35,.5);letter-spacing:.3px}

/* ── SECTION HEADER ── */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-title{font-family:'Public Sans',sans-serif;font-weight:800;font-size:15px;color:#2d1923;letter-spacing:-.3px}
.sec-link{font-size:12px;font-weight:700;color:#ec5914;cursor:pointer;background:none;border:none;font-family:'Public Sans',sans-serif}

/* ── TASK ROW ── */
.task-row{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid rgba(0,0,0,.05)}
.task-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justif-content:center;flex-shrink:0;font-size:18px;align-items:center;justify-content:center}

/* Progress ring util */
.ring-wrap{position:relative;display:flex;align-items:center;justify-content:center}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

/* ─── TOKENS ─── */
const T={
  plum:'#911b44',plumDk:'#3c1226',plumDeep:'#7c012d',
  orange:'#ec5914',orangeLt:'#ffe7db',
  bg:'#faf5ff',white:'#fff',
  dark:'#2d1923',mid:'rgba(45,25,35,.5)',muted:'rgba(45,25,35,.3)',
  green:'#006c4f',greenLt:'#afe4dc',
  border:'rgba(145,27,68,.1)',
  grad:'linear-gradient(135deg,#911b44,#ec5914)',
  gradSoft:'linear-gradient(135deg,rgba(145,27,68,.08),rgba(236,89,20,.06))',
};

/* ─── SVG ICONS ─── */
const Ico=({n,s=20,c=T.plum,style:st={}})=>{
  const v={
    back:<path d="M10 4L4 10l6 6" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" fill="none"/>,
    menu:<><line x1="3" y1="6" x2="17" y2="6" stroke={c} strokeWidth="2" strokeLinecap="round"/><line x1="3" y1="11" x2="17" y2="11" stroke={c} strokeWidth="2" strokeLinecap="round"/><line x1="3" y1="16" x2="12" y2="16" stroke={c} strokeWidth="2" strokeLinecap="round"/></>,
    bell:<><path d="M18 16H6l2-4V8a4 4 0 118 0v4l2 4z" stroke={c} strokeWidth="1.5" fill="none"/><path d="M10 20a2 2 0 004 0" stroke={c} strokeWidth="1.5" fill="none"/></>,
    home:<><path d="M3 11l9-9 9 9" stroke={c} strokeWidth="1.8" strokeLinecap="round" fill="none"/><path d="M5 9v10a1 1 0 001 1h4v-6h4v6h4a1 1 0 001-1V9" stroke={c} strokeWidth="1.8" strokeLinecap="round" fill="none"/></>,
    tasks:<><rect x="3" y="3" width="7" height="7" rx="1.5" stroke={c} strokeWidth="1.8" fill="none"/><rect x="14" y="3" width="7" height="7" rx="1.5" stroke={c} strokeWidth="1.8" fill="none"/><rect x="3" y="14" width="7" height="7" rx="1.5" stroke={c} strokeWidth="1.8" fill="none"/><rect x="14" y="14" width="7" height="7" rx="1.5" stroke={c} strokeWidth="1.8" fill="none"/></>,
    wallet:<><path d="M2 8a2 2 0 012-2h16a2 2 0 012 2v10a2 2 0 01-2 2H4a2 2 0 01-2-2V8z" stroke={c} strokeWidth="1.8" fill="none"/><circle cx="16" cy="13" r="1.5" fill={c}/><path d="M2 11h20" stroke={c} strokeWidth="1.8"/><path d="M6 4l3-2 3 2 3-2" stroke={c} strokeWidth="1.8" strokeLinecap="round" fill="none"/></>,
    user:<><circle cx="12" cy="8" r="3.5" stroke={c} strokeWidth="1.8" fill="none"/><path d="M4 20c0-3.87 3.58-7 8-7s8 3.13 8 7" stroke={c} strokeWidth="1.8" strokeLinecap="round" fill="none"/></>,
    star:<path d="M12 2l2.9 6.26L22 9.27l-5 5.14 1.18 7.22L12 18.4l-6.18 3.23L7 14.41 2 9.27l7.1-1.01L12 2z" fill={c}/>,
    check:<path d="M4 12l5 5L20 7" stroke={c} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" fill="none"/>,
    camera:<><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2v11z" stroke={c} strokeWidth="1.8" fill="none"/><circle cx="12" cy="13" r="4" stroke={c} strokeWidth="1.8" fill="none"/></>,
    loc:<><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0118 0z" stroke={c} strokeWidth="1.8" fill="none"/><circle cx="12" cy="10" r="3" stroke={c} strokeWidth="1.8" fill="none"/></>,
    shield:<><path d="M12 2l8 4v6c0 5-4 9.4-8 10.3C8 21.4 4 17 4 12V6l8-4z" stroke={c} strokeWidth="1.8" fill="none"/><path d="M9 12l2 2 4-4" stroke={c} strokeWidth="1.8" strokeLinecap="round" fill="none"/></>,
    flash:<path d="M13 2L3 14h9l-1 8L21 10h-9l1-8z" stroke={c} strokeWidth="1.8" strokeLinejoin="round" fill="none"/>,
    id:<><rect x="2" y="5" width="20" height="14" rx="2" stroke={c} strokeWidth="1.8" fill="none"/><circle cx="8" cy="11" r="2" stroke={c} strokeWidth="1.5" fill="none"/><path d="M13 9h5M13 13h3" stroke={c} strokeWidth="1.5" strokeLinecap="round"/></>,
    plus:<><line x1="12" y1="5" x2="12" y2="19" stroke={c} strokeWidth="2" strokeLinecap="round"/><line x1="5" y1="12" x2="19" y2="12" stroke={c} strokeWidth="2" strokeLinecap="round"/></>,
    chart:<><polyline points="22 12 18 12 15 21 9 3 6 12 2 12" stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" fill="none"/></>,
    arrow:<path d="M5 12h14M12 5l7 7-7 7" stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" fill="none"/>,
    edit:<><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7" stroke={c} strokeWidth="1.8" fill="none" strokeLinecap="round"/><path d="M18.5 2.5a2.12 2.12 0 013 3L12 15l-4 1 1-4z" stroke={c} strokeWidth="1.8" fill="none"/></>,
    gear:<><circle cx="12" cy="12" r="3" stroke={c} strokeWidth="1.8" fill="none"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke={c} strokeWidth="1.8" strokeLinecap="round"/></>,
  };
  return <svg width={s} height={s} viewBox="0 0 24 24" fill="none" style={st}>{v[n]}</svg>;
};

/* ─── STATUS BAR ─── */
const SBar=({light})=>{
  const col=light?'#fff':T.dark;
  return(
    <div className="sbar" style={{color:col,position:'relative',background:'inherit'}}>
      <span>9:41</span>
      <div className="notch" style={{background:light?'rgba(0,0,0,0.5)':'#150810'}}/>
      <div style={{display:'flex',gap:5,alignItems:'center'}}>
        <svg width="16" height="11" viewBox="0 0 16 11" fill={col}><rect x="0" y="4" width="3" height="7" rx="1"/><rect x="4.5" y="2" width="3" height="9" rx="1"/><rect x="9" y="0" width="3" height="11" rx="1"/><rect x="13.5" y="1" width="2.5" height="8" rx="1" opacity=".3"/></svg>
        <svg width="16" height="11" viewBox="0 0 18 12" fill="none"><rect x=".5" y=".5" width="13" height="10" rx="2" stroke={col}/><rect x="2" y="2" width="9" height="7" rx="1" fill={col}/><rect x="14.5" y="3.5" width="2.5" height="4" rx="1" fill={col}/></svg>
      </div>
    </div>
  );
};

/* ─── BACK HEADER ─── */
const BackHdr=({title,onBack,light,right})=>(
  <div style={{height:56,display:'flex',alignItems:'center',padding:'0 20px',gap:14,background:light?T.plum:'transparent',flexShrink:0}}>
    <button onClick={onBack} style={{width:36,height:36,borderRadius:10,background:light?'rgba(255,255,255,.15)':'rgba(145,27,68,.08)',border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <Ico n="back" s={16} c={light?'#fff':T.plum}/>
    </button>
    <span style={{fontFamily:'Public Sans',fontWeight:800,fontSize:17,color:light?'#fff':T.dark,flex:1,letterSpacing:'-.4px'}}>{title}</span>
    {right}
  </div>
);

/* ─── APP HEADER ─── */
const AppHdr=({greeting,name,onNotif})=>(
  <div style={{padding:'8px 24px 12px',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
    <div>
      {greeting&&<div style={{fontSize:12,fontWeight:600,color:T.mid,letterSpacing:.3}}>{greeting}</div>}
      <div style={{fontFamily:'Public Sans',fontWeight:800,fontSize:20,letterSpacing:'-1px',color:T.plum}}>KA-BAYAN SYNC</div>
    </div>
    <div style={{display:'flex',gap:10}}>
      <button onClick={onNotif} style={{width:40,height:40,borderRadius:12,background:T.orangeLt,border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
        <Ico n="bell" s={18} c={T.orange}/>
      </button>
    </div>
  </div>
);

/* ─── BOTTOM NAV ─── */
const BNav=({active,onNav})=>{
  const tabs=[{id:'home',icon:'home',label:'Home'},{id:'tasks',icon:'tasks',label:'Tasks'},{id:'wallet',icon:'wallet',label:'Wallet'},{id:'profile',icon:'user',label:'Profile'}];
  return(
    <div className="bnav">
      {tabs.map(t=>(
        <button key={t.id} className={`nitem ${active===t.id?'on':''}`} onClick={()=>onNav(t.id)}>
          <Ico n={t.icon} s={22} c={active===t.id?T.plum:'#bec8d1'}/>
          <span className={`nlabel ${active===t.id?'on':''}`}>{t.label}</span>
        </button>
      ))}
    </div>
  );
};

/* ─── AVATAR ─── */
const Avatar=({size=48,seed='J',bg='linear-gradient(135deg,#d4a5a5,#b07070)'})=>(
  <div style={{width:size,height:size,borderRadius:size*.3,background:bg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:size*.4,fontWeight:800,color:'#fff',fontFamily:'Public Sans',flexShrink:0}}>{seed}</div>
);

/* ─── PROGRESS RING ─── */
const Ring=({pct,size=80,stroke=8,c1=T.plum,c2='rgba(145,27,68,.1)',children})=>{
  const r=(size-stroke*2)/2,circ=2*Math.PI*r,off=circ*(1-pct/100);
  return(
    <div className="ring-wrap" style={{width:size,height:size}}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{position:'absolute',top:0,left:0}}>
        <circle cx={size/2} cy={size/2} r={r} stroke={c2} strokeWidth={stroke} fill="none"/>
        <circle cx={size/2} cy={size/2} r={r} stroke={c1} strokeWidth={stroke} fill="none"
          strokeDasharray={circ} strokeDashoffset={off} strokeLinecap="round"
          style={{transform:`rotate(-90deg)`,transformOrigin:`${size/2}px ${size/2}px`,transition:'stroke-dashoffset .6s ease'}}/>
      </svg>
      <div style={{position:'relative',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>{children}</div>
    </div>
  );
};

/* ─── TAG ─── */
const Tag=({c='green',children})=>{
  const cols={green:{bg:'rgba(175,228,220,.4)',col:'#006c4f'},orange:{bg:'rgba(236,89,20,.12)',col:'#ec5914'},plum:{bg:'rgba(145,27,68,.1)',col:'#911b44'},red:{bg:'rgba(239,68,68,.1)',col:'#dc2626'}};
  const s=cols[c]||cols.green;
  return <span className="chip" style={{background:s.bg,color:s.col}}>{children}</span>;
};


/* ══════════════════════════════════════════
   SCREENS
══════════════════════════════════════════ */

/* ── WELCOME ── */
const Welcome=({nav})=>(
  <div className="screen" style={{background:T.plumDk}}>
    <div style={{flex:1,position:'relative',overflow:'hidden'}}>
      {/* bg pattern */}
      <div style={{position:'absolute',inset:0,background:'radial-gradient(ellipse at 20% 20%,rgba(236,89,20,.25) 0%,transparent 60%), radial-gradient(ellipse at 80% 80%,rgba(145,27,68,.4) 0%,transparent 60%)'}}/>
      <svg style={{position:'absolute',inset:0,width:'100%',height:'100%',opacity:.04}} viewBox="0 0 390 844" xmlns="http://www.w3.org/2000/svg">
        {Array.from({length:12}).map((_,i)=><line key={i} x1={i*36} y1="0" x2={i*36} y2="844" stroke="#fff" strokeWidth="1"/>)}
        {Array.from({length:24}).map((_,i)=><line key={i} x1="0" y1={i*36} x2="390" y2={i*36} stroke="#fff" strokeWidth="1"/>)}
      </svg>
      {/* floating orbs */}
      <div style={{position:'absolute',top:60,right:-30,width:220,height:220,borderRadius:'50%',background:'radial-gradient(circle,rgba(236,89,20,.2),transparent)',animation:'float 4s ease-in-out infinite'}}/>
      <div style={{position:'absolute',top:160,left:-40,width:160,height:160,borderRadius:'50%',background:'radial-gradient(circle,rgba(145,27,68,.3),transparent)',animation:'float 5s ease-in-out infinite .5s'}}/>
      {/* logo pill */}
      <div style={{position:'absolute',top:60,left:32}}>
        <SBar light/>
        <div style={{display:'inline-flex',alignItems:'center',gap:8,background:'rgba(255,255,255,.1)',borderRadius:999,padding:'6px 14px 6px 8px',border:'1px solid rgba(255,255,255,.15)'}}>
          <div style={{width:28,height:28,borderRadius:8,background:T.orange,display:'flex',alignItems:'center',justifyContent:'center'}}>
            <Ico n="shield" s={14} c="#fff"/>
          </div>
          <span style={{fontFamily:'Public Sans',fontWeight:800,fontSize:12,color:'rgba(255,255,255,.85)',letterSpacing:'.5px'}}>KA-BAYAN SYNC</span>
        </div>
      </div>
      {/* hero illustration placeholder */}
      <div style={{position:'absolute',top:130,left:'50%',transform:'translateX(-50%)',width:280,height:280,display:'flex',alignItems:'center',justifyContent:'center'}}>
        <div style={{width:220,height:220,borderRadius:'50%',border:'2px solid rgba(236,89,20,.3)',display:'flex',alignItems:'center',justifyContent:'center',animation:'float 3s ease-in-out infinite'}}>
          <div style={{width:160,height:160,borderRadius:'50%',background:'rgba(236,89,20,.1)',display:'flex',alignItems:'center',justifyContent:'center',border:'2px solid rgba(236,89,20,.2)'}}>
            <span style={{fontSize:64}}>🏘️</span>
          </div>
        </div>
        {/* orbiting dots */}
        {[0,60,120,180,240,300].map((deg,i)=>(

    if(phase!=='scanning')return;
    const iv=setInterval(()=>setProg(p=>{if(p>=100){clearInterval(iv);setPhase('done');return 100;}return p+1.5;}),50);
    return()=>clearInterval(iv);
  },[phase]);
  useEffect(()=>{if(phase==='done'){const t=setTimeout(()=>nav('verify-success'),1000);return()=>clearTimeout(t);}},[phase]);
  const circ=2*Math.PI*110;
  return(
    <div className="screen" style={{background:T.bg}}>

          <button onClick={shoot} style={{width:70,height:70,borderRadius:'50%',background:T.plum,border:`5px solid rgba(145,27,68,.35)`,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 8px 28px rgba(145,27,68,.4)'}}>
            <Ico n="camera" s={24} c="#fff"/>
          </button>
          <button style={{width:44,height:44,borderRadius:'50%',background:'rgba(236,89,20,.3)',border:'none',cursor:'pointer',fontSize:18}}>🔄</button>
        </div>
      </div>
      <div style={{padding:'12px 20px 24px',background:'#111018'}}>
        <button className="btn btn-plum" onClick={()=>nav('completion-summary')} style={{background:T.plum}}>Request Client Verification</button>
      </div>
    </div>
  );
};

/* ── COMPLETION SUMMARY ── */
const CompletionSummary=({nav})=>(
  <div className="screen" style={{background:T.bg}}>
    <SBar light/>
    <BackHdr title="Completion Summary" onBack={()=>nav('evidence-log')} light/>
    <div className="scrollable" style={{flex:1,padding:'0 0 160px'}}>
      {/* Worker + header */}
      <div style={{background:'#fff',padding:'16px 20px',marginBottom:12,display:'flex',gap:14,alignItems:'center'}}>
        <Avatar size={52} seed="J" bg={T.grad}/>
        <div>
          <div style={{fontFamily:'Public Sans',fontWeight:900,fontSize:18,letterSpacing:'-.6px',color:T.plum}}>TASK COMPLETED!</div>
          <div style={{fontFamily:'Public Sans',fontWeight:600,fontSize:13,color:T.orange}}>Please verify the details below</div>
        </div>
      </div>
      <div style={{padding:'0 16px'}}>
        {/* Before/After */}
        <div style={{background:'#fff',borderRadius:20,padding:'16px',boxShadow:'0 2px 14px rgba(0,0,0,.06)',marginBottom:14}}>
          <div style={{fontFamily:'Public Sans',fontWeight:800,fontSize:16,letterSpacing:'-.4px',color:T.dark,marginBottom:12}}>Task Logs</div>
          <div style={{display:'flex',gap:10}}>
            {[['BEFORE','🏚️','linear-gradient(135deg,#3c1226,#911b44)'],['AFTER','✨','linear-gradient(135deg,#006c4f,#0891b2)']].map(([label,e,bg])=>(
              <div key={label} style={{flex:1,height:150,borderRadius:14,background:bg,overflow:'hidden',position:'relative',display:'flex',alignItems:'center',justifyContent:'center'}}>
                <span style={{fontSize:44,opacity:.6}}>{e}</span>
                <div style={{position:'absolute',bottom:0,left:0,right:0,padding:'8px',textAlign:'center'}}>
                  <span style={{fontFamily:'Public Sans',fontWeight:700,fontSize:12,color:'rgba(255,255,255,.9)',letterSpacing:'1px'}}>{label}</span>
                </div>
              </div>
            ))}
          </div>
        </div>
        {/* Details */}
        <div style={{background:'#fff',borderRadius:20,padding:'16px',boxShadow:'0 2px 14px rgba(0,0,0,.06)',marginBottom:14}}>
          <div style={{fontFamily:'Public Sans',fontWeight:800,fontSize:15,color:T.dark,marginBottom:12}}>Task Details</div>
          {[['Service Category','House Cleaning'],['Geo-Coordinate','7.3051 N, 125.6792 E'],['Authentication','100% Secure & Matched'],['Labor Duration','1h 15m (09:00 – 10:15)'],['Total Earned','₱207.00']].map(([k,v],i,a)=>(
            <div key={k} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:i<a.length-1?`1px solid ${T.border}`:'none'}}>
              <span style={{fontSize:12,fontWeight:500,color:T.mid}}>{k}</span>
              <span style={{fontFamily:'Public Sans',fontWeight:700,fontSize:13,color:k==='Total Earned'?T.green:T.plum}}>{v}</span>
            </div>
          ))}
        </div>
        {/* Rating prompt */}
        <div style={{background:'#fff',borderRadius:20,padding:'16px',boxShadow:'0 2px 14px rgba(0,0,0,.06)'}}>
          <div style={{fontFamily:'Public Sans',fontWeight:700,fontSize:14,color:T.dark,marginBottom:10}}>Rate your experience</div>
          <div style={{display:'flex',justifyContent:'center',gap:8}}>
            {[1,2,3,4,5].map(s=><Ico key={s} n="star" s={32} c={s<=5?'#f59e0b':'#e2e8f0'}/>)}
          </div>
        </div>
      </div>
    </div>
    <div style={{position:'absolute',bottom:0,left:0,right:0,padding:'12px 20px 28px',background:`linear-gradient(to top,${T.bg} 75%,transparent)`}}>
      <p style={{fontFamily:'Public Sans',fontSize:11,color:T.mid,textAlign:'center',marginBottom:10,letterSpacing:'-.5px'}}>*By continuing, you confirm the task is complete.</p>
      <button className="btn btn-gradient" style={{marginBottom:10,boxShadow:'0 6px 20px rgba(145,27,68,.3)'}} onClick={()=>nav('worker-dash')}>Proceed to Payment</button>
      <button className="btn btn-ghost">Report a Problem</button>
    </div>
  </div>
);


/* ════════════════════════════════════
   APP ROUTER
════════════════════════════════════ */
const SCREENS={
  welcome:Welcome,signup:SignUp,signin:SignIn,
  'id-select':IDSelect,'id-scan':IDScan,'id-review':IDReview,'face-scan':FaceScan,'verify-success':VerifySuccess,
  'resident-dash':ResidentDash,'hirer-map':HirerMap,'create-task':CreateTask,
  'worker-dash':WorkerDash,'nearby-tasks':NearbyTasks,'task-available':TaskAvailable,'evidence-log':EvidenceLog,'completion-summary':CompletionSummary,
};
const LABELS={
  welcome:'🏠 Welcome',signup:'📝 Sign Up',signin:'🔑 Sign In',
  'id-select':'🪪 ID Type','id-scan':'📷 ID Scan','id-review':'✅ ID Review','face-scan':'👤 Face Scan','verify-success':'🎉 Verified',
  'resident-dash':'🏡 Resident','hirer-map':'🗺️ Map','create-task':'📋 Task',
  'worker-dash':'👷 Worker','nearby-tasks':'📍 Nearby Tasks','task-available':'📢 Alert','evidence-log':'📸 Evidence','completion-summary':'🏁 Complete',
};

function App(){
  const [screen,setScreen]=useState('welcome');
  const nav=useCallback(s=>setScreen(s),[]);
  const Screen=SCREENS[screen]||Welcome;
  return(
    <>
      <div className="picker">
        {Object.entries(LABELS).map(([id,label])=>(
          <button key={id} className={`pick-btn ${screen===id?'active':''}`} onClick={()=>nav(id)}>{label}</button>
        ))}
      </div>
      <div className="phone">
        <Screen nav={nav} key={screen}/>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
